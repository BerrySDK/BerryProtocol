name: Feature request
description: Sugira uma melhoria para o BerryProtocol
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problema
      description: Qual problema você quer resolver?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposta
      description: Como você imagina a solução?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Contexto adicional
